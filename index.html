<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cars</title>
    <link rel="stylesheet" href="./style.css">
</head>

<body>
    <nav>
        <div class="brand-name">
            <h1>Apex Rentals</h1>

        </div>
        <div class="nav-links">
            <a href="/">Home</a>
            <a href="/about">About</a>
            
        </div>
        <div class="discover-btn">
            <button>Contact Us</button>
        </div>

    </nav>
    <div class="container">

        <div class="div">
            <p class="p1">Welcome to Apex Rentals!</p><br>
            <p class="p2">Discover the best car rental deals with Apex Rentals !</p>
        </div>

        <div class="form-section">
            <label for="email">Email:</label>
            <input type="email" id="email" placeholder="Enter your email">
            
            <label for="date-of-birth">Date of Birth:</label>
            <input type="date" id="date-of-birth" name="date-of-birth">
            
            <label for="car">Enter the car you want to rent:</label>
            <input type="text" id="car" name="car" placeholder="Enter the car you want">
            <label for="upload">Upload your license:</label>
            <input type="file" id="upload" name="upload">

            <button type="submit">Send your request</button>
        </div>
    </div>
</body>

</html>
